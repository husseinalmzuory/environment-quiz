<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>منصة الاختبارات الجغرافية التفاعلية</title>
<style>
:root {
  --green:#1f7a4d; --green-dark:#145c39; --green-soft:#eaf6ef;
  --red:#b42318; --red-soft:#fdecec; --blue:#245b89;
  --gray:#677085; --border:#d9e3dc; --card:#fff;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(180deg,#eef7f1 0%,#f8faf9 100%);
  color:#1f2933; line-height:1.8;
}
.container { max-width:980px; margin:0 auto; padding:22px; }
.header {
  background:linear-gradient(135deg,var(--green),var(--blue)); color:#fff;
  padding:24px; border-radius:22px; box-shadow:0 10px 30px rgba(31,122,77,.18);
  margin-bottom:20px;
}
.header h1 { margin:0 0 8px; font-size:28px; }
.header p { margin:0; opacity:.95; }
.panel,.controls,.toolbar,.card,.summary,.empty-state {
  background:#fff; border:1px solid var(--border); border-radius:20px;
  box-shadow:0 6px 20px rgba(16,24,40,.06);
}
.panel { padding:16px; margin-bottom:16px; }
.panel h2 { margin:0 0 10px; font-size:18px; color:var(--green-dark); }
.book-buttons { display:grid; grid-template-columns:repeat(5,minmax(120px,1fr)); gap:10px; }
.book-btn {
  border:1px solid #cfded5; background:#fff; color:#1f2933; border-radius:16px;
  padding:12px 10px; font-weight:bold; cursor:pointer; font-family:inherit;
}
.book-btn:hover { background:var(--green-soft); border-color:#9ed3b1; }
.book-btn.active {
  background:linear-gradient(135deg,var(--green),var(--blue)); color:#fff; border-color:transparent;
}
.book-btn.empty { opacity:.78; }
.controls { padding:14px 16px; margin-bottom:16px; display:grid; grid-template-columns:1fr auto; gap:14px; align-items:end; }
.selectbox label { display:block; color:var(--gray); font-weight:bold; margin-bottom:6px; }
select { width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:12px; font-family:inherit; font-size:15px; background:#fff; }
.toolbar { padding:14px 16px; display:flex; gap:12px; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; }
.progress-wrap { flex:1; min-width:230px; }
.progress-label { display:flex; justify-content:space-between; color:var(--gray); font-size:14px; margin-bottom:8px; }
.progress-bar { width:100%; height:10px; background:#edf1ef; border-radius:999px; overflow:hidden; }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--green),#56b77c); transition:.25s ease; }
.score-box { font-weight:bold; color:var(--green-dark); background:var(--green-soft); border:1px solid #c9ead5; padding:8px 12px; border-radius:12px; }
.card { padding:24px; min-height:430px; }
.q-meta { color:var(--gray); font-weight:bold; margin-bottom:8px; }
.question { font-size:22px; font-weight:bold; margin:4px 0 18px; }
.choices { display:grid; gap:12px; }
.choice {
  border:2px solid #e1e8e3; border-radius:16px; padding:13px 16px; cursor:pointer;
  display:flex; gap:12px; align-items:flex-start; transition:.18s ease; background:#fff;
}
.choice:hover { border-color:#9ed3b1; background:#fbfffc; }
.choice input { margin-top:8px; transform:scale(1.15); }
.choice .letter { font-weight:bold; color:var(--green-dark); min-width:28px; }
.choice.selected { border-color:var(--green); background:var(--green-soft); }
.choice.correct { border-color:var(--green); background:#e8f7ef; }
.choice.wrong { border-color:var(--red); background:var(--red-soft); }
.feedback { margin-top:16px; padding:14px 16px; border-radius:16px; display:none; }
.feedback.show { display:block; }
.feedback.correct { background:#e8f7ef; border:1px solid #bde5cb; color:#145c39; }
.feedback.wrong { background:#fdecec; border:1px solid #fac5c1; color:#8a1f16; }
.nav { display:flex; gap:10px; justify-content:space-between; align-items:center; margin-top:18px; flex-wrap:wrap; }
.nav-group { display:flex; gap:10px; flex-wrap:wrap; }
button {
  border:0; border-radius:14px; padding:11px 18px; font-weight:bold; cursor:pointer;
  font-family:inherit; font-size:15px; transition:.18s ease;
}
button.primary { background:var(--green); color:#fff; }
button.primary:hover { background:var(--green-dark); }
button.secondary { background:#eef2f0; color:#1f2933; }
button.secondary:hover { background:#e1e8e3; }
button.danger { background:#fff0f0; color:#9b1c16; }
button:disabled { opacity:.45; cursor:not-allowed; }
.summary { display:none; padding:24px; margin-top:18px; }
.summary.show { display:block; }
.summary h2 { margin-top:0; color:var(--green-dark); }
.jump { display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }
.jump button { width:38px; height:38px; padding:0; border-radius:12px; background:#f0f4f2; color:#334155; }
.jump button.answered { background:#dff2e6; color:#145c39; }
.jump button.current { background:var(--green); color:#fff; }
.empty-state { padding:28px; text-align:center; color:#526071; border-style:dashed; }
.empty-state strong { display:block; color:var(--green-dark); font-size:20px; margin-bottom:8px; }
.hidden { display:none !important; }
@media (max-width:800px) { .book-buttons { grid-template-columns:repeat(2,minmax(120px,1fr)); } .controls { grid-template-columns:1fr; } }
@media (max-width:600px) { .container { padding:14px; } .header h1 { font-size:23px; } .question { font-size:19px; } .card { padding:18px; } button { width:100%; } .nav-group { width:100%; } .book-buttons { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>منصة الاختبارات الجغرافية التفاعلية</h1>
    <p>اختر الكتاب أولًا، ثم اختر الفصل أو اعرض جميع فصول الكتاب.</p>
  </div>

  <div class="panel">
    <h2>اختر الكتاب</h2>
    <div class="book-buttons" id="bookButtons"></div>
  </div>

  <div class="controls" id="controls">
    <div class="selectbox">
      <label for="chapterSelect">اختر الفصل</label>
      <select id="chapterSelect"></select>
    </div>
    <button class="secondary" id="allBtn">عرض جميع فصول هذا الكتاب</button>
  </div>

  <div id="emptyState" class="empty-state hidden">
    <strong>لم تُضف أسئلة هذا الكتاب بعد</strong>
    <span>عند تزويدي بملف الكتاب، سأضيف فصوله وأسئلته داخل الزر الخاص به.</span>
  </div>

  <div id="quizArea">
    <div class="toolbar">
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="progressText">السؤال 1</span>
          <span id="answeredText">المجاب عنها: 0</span>
        </div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      </div>
      <div class="score-box" id="scoreBox">الدرجة: 0</div>
    </div>

    <div class="card" id="quizCard">
      <div class="q-meta" id="qMeta"></div>
      <div class="question" id="questionText"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="nav">
        <div class="nav-group">
          <button class="secondary" id="prevBtn">السابق</button>
          <button class="primary" id="nextBtn">التالي</button>
        </div>
        <div class="nav-group">
          <button class="secondary" id="showBtn">إظهار الإجابة</button>
          <button class="danger" id="resetBtn">إعادة المحاولة</button>
        </div>
      </div>
    </div>

    <div class="jump" id="jump"></div>

    <div class="summary" id="summary">
      <h2>النتيجة النهائية</h2>
      <p id="summaryText"></p>
      <button class="primary" id="reviewBtn">مراجعة الأسئلة</button>
    </div>
  </div>
</div>

let activeBook = books.findIndex(b => b.title === "الكوارث البيئية");
if (activeBook < 0) activeBook = 0;
let mode = 'all';
let currentChapter = 0;
let questions = [];
let current = 0;
let selected = [];
let revealed = [];

const bookButtons = document.getElementById('bookButtons');
const controls = document.getElementById('controls');
const emptyState = document.getElementById('emptyState');
const quizArea = document.getElementById('quizArea');
const chapterSelect = document.getElementById('chapterSelect');
const allBtn = document.getElementById('allBtn');
const qMeta = document.getElementById('qMeta');
const questionText = document.getElementById('questionText');
const choicesDiv = document.getElementById('choices');
const feedback = document.getElementById('feedback');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const showBtn = document.getElementById('showBtn');
const resetBtn = document.getElementById('resetBtn');
const progressText = document.getElementById('progressText');
const answeredText = document.getElementById('answeredText');
const progressFill = document.getElementById('progressFill');
const scoreBox = document.getElementById('scoreBox');
const jump = document.getElementById('jump');
const summary = document.getElementById('summary');
const summaryText = document.getElementById('summaryText');
const reviewBtn = document.getElementById('reviewBtn');

function letter(i) { return ['A','B','C','D'][i]; }

function renderBookButtons() {
  bookButtons.innerHTML = '';
  books.forEach((book, idx) => {
    const btn = document.createElement('button');
    btn.className = 'book-btn';
    if (idx === activeBook) btn.classList.add('active');
    if (!book.chapters || book.chapters.length === 0) btn.classList.add('empty');
    btn.textContent = book.title;
    btn.onclick = () => {
      activeBook = idx;
      currentChapter = 0;
      renderBookButtons();
      renderChapterSelect();
      if ((books[activeBook].chapters || []).length) loadQuestions('all', 0);
      else showEmptyBook();
      window.scrollTo({top:0, behavior:'smooth'});
    };
    bookButtons.appendChild(btn);
  });
}

function renderChapterSelect() {
  chapterSelect.innerHTML = '';
  const chs = books[activeBook].chapters || [];
  chs.forEach((ch, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = ch.title;
    chapterSelect.appendChild(opt);
  });
}

function flattenAll() {
  const chs = books[activeBook].chapters || [];
  return chs.flatMap((ch, cidx) => ch.questions.map((q, qidx) => ({
    ...q, book: books[activeBook].title, chapter: ch.title, chapterIndex:cidx, localIndex:qidx
  })));
}

function showEmptyBook() {
  controls.classList.add('hidden');
  quizArea.classList.add('hidden');
  emptyState.classList.remove('hidden');
}

function showQuizBook() {
  controls.classList.remove('hidden');
  quizArea.classList.remove('hidden');
  emptyState.classList.add('hidden');
}

function loadQuestions(newMode='all', chIndex=0) {
  const chs = books[activeBook].chapters || [];
  if (!chs.length) { showEmptyBook(); return; }
  showQuizBook();
  mode = newMode;
  currentChapter = chIndex;
  questions = mode === 'all'
    ? flattenAll()
    : chs[chIndex].questions.map((q, qidx) => ({
      ...q, book: books[activeBook].title, chapter: chs[chIndex].title, chapterIndex:chIndex, localIndex:qidx
    }));
  current = 0;
  selected = Array(questions.length).fill(null);
  revealed = Array(questions.length).fill(false);
  summary.classList.remove('show');
  renderQuestion();
}

function score() {
  return selected.reduce((acc, val, idx) => acc + (val === questions[idx].answer ? 1 : 0), 0);
}

function updateProgress() {
  const answered = selected.filter(v => v !== null).length;
  progressText.textContent = `السؤال ${current+1} من ${questions.length}`;
  answeredText.textContent = `المجاب عنها: ${answered}`;
  progressFill.style.width = `${(answered/questions.length)*100}%`;
  scoreBox.textContent = `الدرجة: ${score()} / ${questions.length}`;
}

function renderJump() {
  jump.innerHTML = '';
  questions.forEach((_, i) => {
    const b = document.createElement('button');
    b.textContent = i+1;
    if (selected[i] !== null) b.classList.add('answered');
    if (i === current) b.classList.add('current');
    b.onclick = () => { current = i; renderQuestion(); window.scrollTo({top:0, behavior:'smooth'}); };
    jump.appendChild(b);
  });
}

function renderQuestion() {
  const item = questions[current];
  qMeta.textContent = `${item.book} - ${item.chapter} - السؤال ${item.localIndex + 1}`;
  questionText.textContent = item.q;
  choicesDiv.innerHTML = '';
  feedback.className = 'feedback';
  feedback.innerHTML = '';

  item.choices.forEach((ch, idx) => {
    const label = document.createElement('label');
    label.className = 'choice';
    if (selected[current] === idx) label.classList.add('selected');
    if (revealed[current]) {
      if (idx === item.answer) label.classList.add('correct');
      else if (selected[current] === idx) label.classList.add('wrong');
    }

    const input = document.createElement('input');
    input.type = 'radio';
    input.name = 'choice';
    input.checked = selected[current] === idx;
    input.onchange = () => {
      selected[current] = idx;
      revealed[current] = true;
      renderQuestion();
    };

    const ltr = document.createElement('span');
    ltr.className = 'letter';
    ltr.textContent = letter(idx) + '.';

    const text = document.createElement('span');
    text.textContent = ch;

    label.appendChild(input);
    label.appendChild(ltr);
    label.appendChild(text);
    choicesDiv.appendChild(label);
  });

  if (revealed[current]) {
    const ok = selected[current] === item.answer;
    feedback.className = 'feedback show ' + (ok ? 'correct' : 'wrong');
    feedback.innerHTML = `<strong>${ok ? 'إجابة صحيحة' : 'إجابة غير صحيحة'}</strong><br>
      الإجابة الصحيحة: <strong>${letter(item.answer)}</strong><br>
      التعليل: ${item.explanation}`;
  }

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === questions.length - 1 ? 'إنهاء الاختبار' : 'التالي';
  showBtn.disabled = revealed[current];
  updateProgress();
  renderJump();
}

chapterSelect.onchange = () => loadQuestions('chapter', Number(chapterSelect.value));
allBtn.onclick = () => loadQuestions('all', 0);

prevBtn.onclick = () => {
  if (current > 0) { current--; renderQuestion(); }
};

nextBtn.onclick = () => {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    summary.classList.add('show');
    summaryText.innerHTML = `حصلت على <strong>${score()}</strong> من <strong>${questions.length}</strong>.`;
    summary.scrollIntoView({behavior:'smooth', block:'start'});
  }
};

showBtn.onclick = () => { revealed[current] = true; renderQuestion(); };

resetBtn.onclick = () => {
  if (confirm('هل تريد إعادة المحاولة من البداية؟')) {
    selected = Array(questions.length).fill(null);
    revealed = Array(questions.length).fill(false);
    current = 0;
    summary.classList.remove('show');
    renderQuestion();
  }
};

reviewBtn.onclick = () => {
  summary.classList.remove('show');
  current = 0;
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
};

renderBookButtons();
renderChapterSelect();
loadQuestions('all', 0);
</script>
